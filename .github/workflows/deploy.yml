name: Build and Deploy

on:
  # Auto-deploy on push to main
  push:
    branches: [main]
  # Sanity webhook triggers this
  repository_dispatch:
    types: [sanity-content-update]
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build static site
        run: npx next build

      - name: Commit and push out folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/ -f
          git diff --staged --quiet || (git commit -m "Auto-build: update out folder [skip ci]" && git push)
